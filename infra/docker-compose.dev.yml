services:
  postgres:
    image: postgres:16-alpine
    container_name: supadupabase-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supadupabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-supadupabase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supadupabase} -d ${POSTGRES_DB:-supadupabase}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
