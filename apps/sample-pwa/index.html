<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080c" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>SupaDupaBase Sample PWA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="shell">
    <header>
      <div class="brand"><span class="hex"></span> Sample PWA</div>
      <span id="status" class="muted">Signed out</span>
    </header>

    <main>
      <section id="auth-panel" class="card">
        <h1>SupaDupaBase demo</h1>
        <p class="muted">Email/password, session refresh, and RLS-scoped profiles.</p>

        <form id="signup-form">
          <h2>Sign up</h2>
          <input id="su-email" type="email" placeholder="Email" required />
          <input id="su-password" type="password" placeholder="Password (8+)" minlength="8" required />
          <button type="submit">Create account</button>
        </form>

        <form id="login-form">
          <h2>Sign in</h2>
          <input id="li-email" type="email" placeholder="Email" required />
          <input id="li-password" type="password" placeholder="Password" required />
          <button type="submit">Sign in</button>
          <button type="button" id="google-btn" class="ghost">Google</button>
        </form>

        <div id="auth-error" class="error" hidden></div>
      </section>

      <section id="profile-panel" class="card" hidden>
        <h2>Your profile (RLS)</h2>
        <pre id="profile-json"></pre>
        <label>Display name <input id="display-name" type="text" /></label>
        <button id="save-profile" type="button">Save</button>
        <button id="refresh-session" type="button" class="ghost">Refresh session</button>
        <button id="logout-btn" type="button" class="ghost">Logout</button>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
