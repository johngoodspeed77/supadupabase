<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupaDupaBase Admin</title>
    <link rel="stylesheet" href="/ui/theme.css" />
    <link rel="stylesheet" href="/ui/components.css" />
    <link rel="stylesheet" href="/ui/admin-shell.css" />
  </head>
  <body class="sdb-shell">
    <header class="sdb-topbar">
      <div class="sdb-brand">
        <span class="sdb-hex-logo" aria-hidden="true"></span>
        <span>SupaDupaBase</span>
      </div>
      <div class="sdb-user-menu">
        <span id="user-email" class="sdb-muted">Not signed in</span>
        <button id="logout-btn" class="sdb-btn sdb-btn--ghost" type="button" hidden>Logout</button>
      </div>
    </header>

    <div class="sdb-layout">
      <nav class="sdb-nav" aria-label="Admin navigation">
        <a href="#projects" class="sdb-nav__link is-active" data-view="projects">Projects</a>
        <a href="#users" class="sdb-nav__link" data-view="users">Users</a>
        <a href="#keys" class="sdb-nav__link" data-view="keys">API Keys</a>
        <a href="#login" class="sdb-nav__link" data-view="login">Login</a>
      </nav>

      <main class="sdb-main">
        <section id="view-projects" class="sdb-view">
          <div class="sdb-main__header">
            <h1>Projects</h1>
            <p class="sdb-muted">SupaDupaBase projects and allowed origins.</p>
          </div>
          <div class="sdb-card">
            <table class="sdb-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Slug</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="projects-body">
                <tr><td colspan="3" class="sdb-muted">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section id="view-users" class="sdb-view" hidden>
          <div class="sdb-main__header">
            <h1>Users</h1>
            <p class="sdb-muted">Registered auth users.</p>
          </div>
          <div id="users-content" class="sdb-card">
            <div class="sdb-hex-loader" aria-label="Loading"></div>
          </div>
        </section>

        <section id="view-keys" class="sdb-view" hidden>
          <div class="sdb-main__header">
            <h1>API Keys</h1>
            <p class="sdb-muted">Anon and service-role keys (hashed at rest).</p>
          </div>
          <div id="keys-content" class="sdb-card">
            <form id="create-key-form" class="sdb-form-row">
              <input class="sdb-input" id="key-name" placeholder="Key name" required />
              <select class="sdb-input" id="key-role">
                <option value="anon">anon</option>
                <option value="service_role">service_role</option>
              </select>
              <button class="sdb-btn sdb-btn--primary" type="submit">Create key</button>
            </form>
            <div id="new-key-result" class="sdb-alert sdb-alert--success" hidden></div>
            <div data-keys-list style="margin-top: 1rem"></div>
          </div>
        </section>

        <section id="view-login" class="sdb-view" hidden>
          <div class="sdb-main__header">
            <h1>Sign in</h1>
            <p class="sdb-muted">Admin email must be listed in ADMIN_EMAILS.</p>
          </div>
          <form id="login-form" class="sdb-card" style="max-width: 420px">
            <label class="sdb-label" for="email">Email</label>
            <input class="sdb-input" id="email" name="email" type="email" required autocomplete="username" />

            <label class="sdb-label" for="password" style="margin-top: 0.75rem">Password</label>
            <input class="sdb-input" id="password" name="password" type="password" required minlength="8" autocomplete="current-password" />

            <div id="login-error" class="sdb-alert sdb-alert--error" style="margin-top: 1rem" hidden></div>

            <button class="sdb-btn sdb-btn--primary" type="submit" style="margin-top: 1rem">Sign in</button>
            <button id="google-btn" class="sdb-btn sdb-btn--ghost" type="button" style="margin-top: 0.5rem; width: 100%">
              Sign in with Google
            </button>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
